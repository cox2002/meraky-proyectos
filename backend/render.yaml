services:
  - type: web
    name: meraki-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0 # Or the version you are using
      - key: DATABASE_URL
        sync: false
